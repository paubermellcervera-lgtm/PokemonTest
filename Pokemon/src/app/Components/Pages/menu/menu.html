<div class="menu-container">
  <div class="high-score">
    High Score: {{ highScore() }}
  </div>

  <h1 class="menu-title">{{ 'MENU.TITLE' | translate }}</h1>

  <div style="position: relative; z-index: 100;">
    <button class="btn-lang" (click)="toggleLang()">
      {{ currentLang() === 'es' ? 'EN' : 'ES' }}
    </button>
  </div>

  <div class="options">
    @if (hasSavedGame()) {
      <button class="btn-success" (click)="continuarJuego()">{{ 'MENU.CONTINUE' | translate }}</button>
      <button class="btn-primary" (click)="iniciarJuego()">{{ 'MENU.NEW_GAME' | translate }}</button>
    } @else {
      <button class="btn-primary" (click)="iniciarJuego()">{{ 'MENU.START' | translate }}</button>
    }
    <button class="btn-neutral" (click)="toggleHowToPlay()">{{ 'MENU.HOW_TO_PLAY' | translate }}</button>
    @if (hasHallOfFame()) {
      <button class="btn-Salon_Fama" (click)="irAlSalonFama()">{{ 'MENU.HALL_OF_FAME' | translate }}</button>
    }
  </div>
</div>
